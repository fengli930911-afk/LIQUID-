<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIQUID 达人直播数据看板</title>
<script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --border: #e2e8f0;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --brand: #6366f1;
  --brand-light: #eef2ff;
  --green: #10b981;
  --green-bg: #ecfdf5;
  --red: #ef4444;
  --red-bg: #fef2f2;
  --amber: #f59e0b;
  --amber-bg: #fffbeb;
  --purple: #8b5cf6;
  --purple-bg: #f5f3ff;
  --blue: #3b82f6;
  --blue-bg: #eff6ff;
  --cyan: #06b6d4;
  --cyan-bg: #ecfeff;
  --radius: 16px;
  --radius-sm: 12px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.06), 0 4px 6px rgba(0,0,0,0.03);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.header {
  background: linear-gradient(135deg, #4338ca 0%, #6366f1 50%, #8b5cf6 100%);
  padding: 20px 32px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  position: sticky; top: 0; z-index: 100; color: #fff;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-logo {
  width: 40px; height: 40px; border-radius: 12px; overflow: hidden;
}
.header-logo img { width: 100%; height: 100%; object-fit: cover; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.header-actions { display: flex; gap: 8px; }
.btn {
  padding: 8px 16px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 6px;
  letter-spacing: 0.3px;
}
.btn-white { background: rgba(255,255,255,0.15); color: #fff; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); }
.btn-white:hover { background: rgba(255,255,255,0.25); }
.btn-light { background: #fff; color: var(--brand); border: 1px solid #fff; }
.btn-light:hover { background: #f0f0ff; }
.btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--surface2); }
.btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
.btn-danger:hover { background: var(--red-bg); }
.container { padding: 24px 32px; max-width: 1440px; margin: 0 auto; }
.nav-tabs {
  display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface);
  border-radius: var(--radius-sm); padding: 4px; box-shadow: var(--shadow-sm);
  width: fit-content;
}
.nav-tab {
  padding: 10px 20px; border-radius: 8px; border: none; background: transparent;
  color: var(--text2); font-size: 14px; font-weight: 600; cursor: pointer;
  transition: var(--transition); position: relative;
}
.nav-tab.active { background: var(--brand); color: #fff; box-shadow: var(--shadow-md); }
.nav-tab:hover:not(.active) { color: var(--text); background: var(--surface2); }
.summary-cards {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
}
.summary-card {
  background: var(--surface); border-radius: var(--radius); padding: 24px 28px;
  box-shadow: var(--shadow); transition: var(--transition); position: relative; overflow: hidden;
}
.summary-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.summary-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
}
.summary-card.card-sales::before { background: var(--brand); }
.summary-card.card-net::before { background: var(--green); }
.summary-card.card-ad::before { background: var(--amber); }
.summary-card.card-date::before { background: var(--cyan); }
.summary-card .card-icon { font-size: 28px; margin-bottom: 8px; }
.summary-card .card-label { font-size: 13px; color: var(--text3); font-weight: 500; margin-bottom: 6px; }
.summary-card .card-value { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
.summary-card .card-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
@media (max-width: 1100px) { .summary-cards { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .summary-cards { grid-template-columns: 1fr; } }
.toolbar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
}
.search-box { position: relative; flex: 1; max-width: 260px; }
.search-box .icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px;
}
.search-box input {
  width: 100%; padding: 10px 14px 10px 36px; border: 1px solid var(--border);
  border-radius: 10px; font-size: 13px; outline: none; transition: var(--transition); background: var(--surface);
}
.search-box input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); }
.record-info { font-size: 12px; color: var(--text3); margin-left: auto; }
.table-wrap {
  background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
  overflow: auto; border: 1px solid var(--border);
}
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1050px; }
thead th {
  background: var(--surface2); padding: 14px 16px; text-align: left; font-weight: 700;
  color: var(--text2); border-bottom: 2px solid var(--border); white-space: nowrap;
  cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 2; font-size: 12px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
thead th:hover { background: #eef2ff; color: var(--brand); }
thead th.sorted { color: var(--brand); }
thead th.sorted::after { content: ' \25BC'; }
thead th.sorted.asc::after { content: ' \25B2'; }
td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
tbody tr { transition: background 0.15s; }
tbody tr:hover { background: #f8fafc; }
tbody tr:last-child td { border-bottom: none; }
.anchor-cell { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 34px; height: 34px; border-radius: 50%; object-fit: cover; background: linear-gradient(135deg, #eef2ff, #e0e7ff);
  flex-shrink: 0;
}
.anchor-cell .name { font-weight: 700; color: var(--text); }
#tabRoster th:nth-child(1), #tabRoster td:nth-child(1) { width:100px; }
#tabRoster th:nth-child(2), #tabRoster td:nth-child(2) { width:110px; white-space:nowrap; }
#tabRoster .anchor-cell { gap:6px; }
.num { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
.money { font-weight: 600; }
.money-sales { color: var(--brand); }
.money-refund { color: var(--red); }
.money-net { color: var(--green); }
.rank { width:50px; text-align:center; font-weight:700; font-size:18px; }
.rank-num { font-size:12px; color:var(--text3); }
.fan-bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 120px; }
.fan-bar {
  flex: 1; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden;
}
.fan-bar-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--blue)); border-radius: 3px; transition: width 0.4s ease; }
.fan-pct { font-size: 12px; color: var(--text3); min-width: 40px; text-align: right; }
.roi-badge {
  display: inline-block; padding: 3px 10px; border-radius: 12px; font-weight: 700; font-size: 12px;
}
.roi-high { background: var(--green-bg); color: #065f46; }
.roi-mid { background: var(--amber-bg); color: #92400e; }
.roi-low { background: var(--red-bg); color: #991b1b; }
.roi-none { background: #f1f5f9; color: #64748b; }
.empty {
  text-align: center; padding: 80px 20px; color: var(--text3);
}
.empty-icon { font-size: 56px; margin-bottom: 12px; opacity: 0.6; }
.monthly-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;
  margin-bottom: 24px;
}
.monthly-card {
  background: var(--surface); border-radius: var(--radius); padding: 20px 24px;
  box-shadow: var(--shadow); transition: var(--transition);
  border: 1px solid var(--border); cursor: pointer;
}
.monthly-card.active { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); transform: translateY(-2px); }
.monthly-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--brand-light); }
.monthly-card .month-label { font-size: 18px; font-weight: 700; color: var(--brand); margin-bottom: 16px; }
.monthly-card .stat-row {
  display: flex; justify-content: space-between; align-items: center; padding: 8px 0;
  border-bottom: 1px solid #f1f5f9; font-size: 13px;
}
.monthly-card .stat-row:last-child { border-bottom: none; }
.monthly-card .stat-key { color: var(--text2); }
.monthly-card .stat-val { font-weight: 600; }
.daily-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px;
  margin-bottom: 24px;
}
.daily-card {
  background: var(--surface); border-radius: var(--radius-sm); padding: 18px 20px;
  box-shadow: var(--shadow); transition: var(--transition);
  border: 1px solid var(--border); cursor: pointer;
}
.daily-card.active { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); transform: translateY(-2px); }
.daily-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--brand-light); }
.daily-card .day-label { font-size: 16px; font-weight: 700; color: var(--brand); margin-bottom: 12px; }
.daily-card .day-stat-row {
  display: flex; justify-content: space-between; align-items: center; padding: 5px 0;
  font-size: 12px;
}
.daily-card .day-stat-key { color: var(--text2); font-size: 11px; }
.daily-card .day-stat-val { font-weight: 600; }
.toast {
  position: fixed; top: 24px; right: 24px; padding: 14px 22px; border-radius: 12px;
  color: #fff; font-size: 14px; font-weight: 600; z-index: 999;
  box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
}
.toast-success { background: linear-gradient(135deg, #059669, #10b981); }
.toast-error { background: linear-gradient(135deg, #dc2626, #ef4444); }
.toast-info { background: linear-gradient(135deg, var(--brand), #8b5cf6); }
@keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-12px); } }
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,0.4); z-index: 200;
  display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s;
}
.modal {
  background: var(--surface); border-radius: var(--radius); padding: 32px; max-width: 480px;
  width: 90%; box-shadow: var(--shadow-lg); animation: slideUp 0.25s ease;
}
.modal h3 { font-size: 18px; margin-bottom: 8px; }
.modal p { color: var(--text2); font-size: 14px; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,0.3); z-index: 150;
  animation: fadeIn 0.15s;
}
.drawer {
  position: fixed; right: 0; top: 0; bottom: 0; width: 480px; max-width: 90vw;
  background: var(--surface); z-index: 151; box-shadow: -4px 0 20px rgba(0,0,0,0.1);
  padding: 28px; overflow-y: auto; animation: slideRight 0.25s ease;
}
@keyframes slideRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
.drawer-close {
  position: absolute; top: 16px; right: 16px; width: 32px; height: 32px;
  border-radius: 8px; border: none; background: var(--surface2); cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.drawer-close:hover { background: #fee2e2; color: var(--red); }
.drawer-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; padding-right: 40px; }
@media (max-width: 768px) {
  .container { padding: 16px; }
  .header { padding: 14px 16px; }
  .header h1 { font-size: 17px; }
  .summary-cards { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-logo"><img src="liquid_logo.jpg" alt="LIQUID"></div>
    <h1>LIQUID 达人直播数据看板</h1>
  </div>
</div>
<div class="container">
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" onclick="switchTab('daily')" data-tab="daily">📆 每日看板</button>
    <button class="nav-tab" onclick="switchTab('dashboard')" data-tab="dashboard">📈 达人看板</button>
    <button class="nav-tab" onclick="switchTab('monthly')" data-tab="monthly">📅 月度汇总</button>
    <button class="nav-tab" onclick="switchTab('roster')" data-tab="roster">📋 达人名单</button>
  </div>
  <div id="tabDashboard">
    <div class="summary-cards" id="summaryCards"></div>
    <div class="toolbar">
      <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索达人名称..." oninput="renderDashboard()">
      </div>
      <select id="dateFilter" onchange="renderDashboard()" style="padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:13px;background:var(--surface);">
        <option value="all">全部日期</option>
      </select>
      <label style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;user-select:none;">
        <input type="checkbox" id="hideZeroSales" onchange="renderDashboard()" style="width:16px;height:16px;accent-color:var(--brand);cursor:pointer;"> 隐藏零成交达人
      </label>
      <span class="record-info" id="recordCount"></span>
      <button class="btn btn-outline" onclick="exportJSON()" style="margin-left:auto;">💾 导出JSON</button>
      <button class="btn btn-outline" onclick="showImportModal()">📂 上传新数据</button>
      <button class="btn btn-outline" onclick="showClearModal()" style="color:var(--red);">🗑 清空数据</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>排名</th>
          <th onclick="sortBy('name')" data-key="name">达人</th>
          <th onclick="sortBy('duration_total')" data-key="duration_total">直播时长</th>
          <th onclick="sortBy('sales')" data-key="sales" class="sorted">成交金额</th>
          <th onclick="sortBy('refund_amount')" data-key="refund_amount">退款金额</th>
          <th onclick="sortBy('net_sales')" data-key="net_sales">退后成交额</th>
          <th onclick="sortBy('viewers')" data-key="viewers">观看人数</th>
          <th onclick="sortBy('old_fan_ratio')" data-key="old_fan_ratio">老粉占比</th>
          <th onclick="sortBy('ad_total')" data-key="ad_total">投放消耗</th>
          <th onclick="sortBy('roi')" data-key="roi">投放ROI</th>
        </tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <div id="tabMonthly" style="display:none;">
    <div class="monthly-grid" id="monthlyCards"></div>
    <div id="monthlyDetail" style="display:none;margin-top:24px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h3 style="font-size:18px;font-weight:700;" id="monthlyDetailTitle"></h3>
        <button class="btn btn-outline" onclick="closeMonthDetail()">✖ 关闭</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>排名</th>
            <th>达人</th><th onclick="sortMonthDetail('sales')" style="cursor:pointer;">成交金额</th><th onclick="sortMonthDetail('refund_amount')" style="cursor:pointer;">退款金额</th>
            <th onclick="sortMonthDetail('net_sales')" style="cursor:pointer;">退后成交额</th><th onclick="sortMonthDetail('ad_total')" style="cursor:pointer;">投放消耗</th>
            <th onclick="sortMonthDetail('roi')" style="cursor:pointer;">ROI</th><th onclick="sortMonthDetail('viewers')" style="cursor:pointer;">观看人数</th><th onclick="sortMonthDetail('live_count')" style="cursor:pointer;">直播场次</th>
          </tr></thead>
          <tbody id="monthlyDetailBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div id="tabDaily" style="display:none;">
    <div class="summary-cards" id="dailySummaryCards"></div>
    <div class="toolbar">
      <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" id="dailySearchInput" placeholder="搜索达人名称..." oninput="renderDailyDashboard()">
      </div>
      <select id="dailyDateFilter" onchange="renderDailyDashboard()" style="padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:13px;background:var(--surface);">
      </select>
      <label style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;user-select:none;">
        <input type="checkbox" id="dailyHideZeroSales" onchange="renderDailyDashboard()" style="width:16px;height:16px;accent-color:var(--brand);cursor:pointer;"> 隐藏零成交达人
      </label>
      <span class="record-info" id="dailyRecordCount"></span>
      <button class="btn btn-outline" onclick="exportJSON()" style="margin-left:auto;">💾 导出JSON</button>
      <button class="btn btn-outline" onclick="showImportModal()">📂 上传新数据</button>
      <button class="btn btn-outline" onclick="showClearModal()" style="color:var(--red);">🗑 清空数据</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>排名</th>
          <th onclick="sortDailyBy('name')" data-key="name">达人</th>
          <th onclick="sortDailyBy('duration_total')" data-key="duration_total">直播时长</th>
          <th onclick="sortDailyBy('sales')" data-key="sales" class="sorted">成交金额</th>
          <th onclick="sortDailyBy('refund_amount')" data-key="refund_amount">退款金额</th>
          <th onclick="sortDailyBy('net_sales')" data-key="net_sales">退后成交额</th>
          <th onclick="sortDailyBy('viewers')" data-key="viewers">观看人数</th>
          <th onclick="sortDailyBy('old_fan_ratio')" data-key="old_fan_ratio">老粉占比</th>
          <th onclick="sortDailyBy('ad_total')" data-key="ad_total">投放消耗</th>
          <th onclick="sortDailyBy('roi')" data-key="roi">投放ROI</th>
        </tr></thead>
        <tbody id="dailyTableBody"></tbody>
      </table>
    </div>
  </div>
  <div id="tabRoster" style="display:none;">
    <div class="toolbar" style="margin-bottom:16px;">
      <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" id="rosterSearchInput" placeholder="搜索达人名称或抖音号..." oninput="renderRoster()">
      </div>
      <span class="record-info" id="rosterCount"></span>
      <button class="btn btn-outline" onclick="exportRosterCSV()" style="margin-left:auto;">📋 导出名单 CSV</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>排名</th>
          <th>达人</th><th onclick="sortRoster('douyin_id')" style="cursor:pointer;">抖音号</th><th onclick="sortRoster('live_count')" style="cursor:pointer;">直播场次</th><th onclick="sortRoster('sales')" style="cursor:pointer;">成交金额</th><th onclick="sortRoster('net_sales')" style="cursor:pointer;">退后成交额</th><th onclick="sortRoster('ad_total')" style="cursor:pointer;">投放消耗</th><th onclick="sortRoster('roi')" style="cursor:pointer;">ROI</th>
        </tr></thead>
        <tbody id="rosterBody"></tbody>
      </table>
    </div>
  </div>
</div>
<input type="file" id="jsonInput" accept=".json" style="display:none" onchange="handleJSONImport(event)">
<input type="file" id="excelInput" accept=".xlsx,.xls" style="display:none" onchange="handleExcelImport(event)">

<script>
var STORAGE_KEY = 'liquid_dashboard_v2';

function getDefaultDatasets() {
  return {
    datasets: [{
      id: 'initial',
      label: '初始数据 (示例)',
      dateRange: '--',
      records: [],
      importedAt: new Date().toISOString()
    }],
    activeIdx: 0
  };
}

function loadData() {
  // 支持外部注入数据（用于无头浏览器截图）
  if (window.__INJECTED_DATA__) {
    return window.__INJECTED_DATA__;
  }
  var raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      var parsed = JSON.parse(raw);
      if (parsed.datasets && parsed.datasets.length > 0) return parsed;
    } catch(e) {}
  }
  var init = getDefaultDatasets();
  init.activeIdx = 0;
  saveAll(init);
  return init;
}

function saveAll(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

var appData = loadData();
var currentTab = 'daily';
var selectedMonth = null;
var sortKey = 'sales';
var sortAsc = false;
var dailySortKey = 'sales';
var dailySortAsc = false;
var monthDetailSortKey = 'sales';
var monthDetailSortAsc = false;
var rosterSortKey = 'sales';
var rosterSortAsc = false;

function fmtWan(n, decimals) {
  if (n == null || n === 0) return '0';
  decimals = (decimals != null) ? decimals : 2;
  var val = n / 10000;
  return val.toFixed(decimals).replace(/\.?0+$/, '') + '万';
}
function fmtNum(n) { return n != null ? fmtWan(n, 1) : '0'; }
function fmtMoney(n) {
  if (n == null || n === 0) return '\u00A50万';
  var val = (n / 10000).toFixed(2);
  val = val.replace(/\.?0+$/, '');
  return '\u00A5' + val + '万';
}
function fmtMoneyD(n) {
  if (n == null || n === 0) return '\u00A50.00万';
  var val = (n / 10000).toFixed(2);
  return '\u00A5' + val + '万';
}
function fmtDuration(min) {
  if (!min || min <= 0) return '--';
  var h = Math.floor(min / 60);
  var m = min % 60;
  return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
}

function activeRecords() {
  var all = [];
  for (var i = 0; i < appData.datasets.length; i++) {
    var recs = appData.datasets[i].records || [];
    for (var j = 0; j < recs.length; j++) all.push(recs[j]);
  }
  return all;
}

function aggregateByName(records) {
  var agg = new Map();
  for (var i = 0; i < records.length; i++) {
    var r = records[i];
    var k = r.name || '未知';
    if (!agg.has(k)) {
      agg.set(k, { name: k, avatar: r.avatar || '', viewers: 0, sales: 0, refund_amount: 0, net_sales: 0, ad_cost_bind: 0, ad_cost_bid: 0, old_fan_sum: 0, live_count: 0, duration_total: 0, orders: 0, net_orders: 0 });
    }
    var a = agg.get(k);
    a.viewers += r.viewers || 0;
    a.sales += r.sales || 0;
    a.refund_amount += r.refund_amount || 0;
    a.net_sales += r.net_sales || 0;
    a.ad_cost_bind += r.ad_cost_bind || 0;
    a.ad_cost_bid += r.ad_cost_bid || 0;
    a.old_fan_sum += r.old_fan_ratio || 0;
    a.live_count += 1;
    a.duration_total += r.duration_min || 0;
    a.orders += r.orders || 0;
    a.net_orders += r.net_orders || 0;
  }
  var result = [];
  agg.forEach(function(a) {
    result.push({
      name: a.name, avatar: a.avatar, viewers: a.viewers,
      sales: a.sales, refund_amount: a.refund_amount, net_sales: a.net_sales,
      ad_total: a.ad_cost_bind + a.ad_cost_bid,
      roi: (a.ad_cost_bind + a.ad_cost_bid) > 0 ? (a.net_sales / (a.ad_cost_bind + a.ad_cost_bid)) : -1,
      old_fan_ratio: a.live_count > 0 ? a.old_fan_sum / a.live_count : 0,
      duration_total: a.duration_total, orders: a.orders, net_orders: a.net_orders
    });
  });
  return result;
}

function getROIClass(roi) {
  if (roi < 0) return 'roi-none';
  if (roi >= 3) return 'roi-high';
  if (roi >= 1) return 'roi-mid';
  return 'roi-low';
}

function showToast(msg, type) {
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2600);
}

function sortBy(key) {
  if (sortKey === key) { sortAsc = !sortAsc; }
  else { sortKey = key; sortAsc = false; }
  var ths = document.querySelectorAll('#tabDashboard thead th');
  ths.forEach(function(t) { t.classList.remove('sorted', 'asc'); });
  var target = document.querySelector('#tabDashboard thead th[data-key="' + key + '"]');
  if (target) { target.classList.add('sorted'); if (sortAsc) target.classList.add('asc'); }
  renderDashboard();
}

function renderDashboard() {
  var records = activeRecords();
  if (records.length === 0) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="10"><div class="empty"><div class="empty-icon">📦</div><p>暂无数据，请导入数据</p></div></td></tr>';
    document.getElementById('summaryCards').innerHTML = '';
    document.getElementById('recordCount').textContent = '';
    updateDateFilter(records);
    return;
  }
  var search = document.getElementById('searchInput').value.toLowerCase();
  var dateFilter = document.getElementById('dateFilter').value;
  var filtered = records;
  if (search) filtered = filtered.filter(function(r) { return (r.name||'').toLowerCase().indexOf(search) > -1; });
  if (dateFilter !== 'all') filtered = filtered.filter(function(r) { return r.start_time && normDate(r.start_time).indexOf(dateFilter) === 0; });
  var list = aggregateByName(filtered);
  var hideZero = document.getElementById('hideZeroSales').checked;
  if (hideZero) list = list.filter(function(a) { return a.sales > 0; });
  list.sort(function(a, b) {
    var va = a[sortKey] != null ? a[sortKey] : 0;
    var vb = b[sortKey] != null ? b[sortKey] : 0;
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });
  var totalSales = list.reduce(function(s, a) { return s + a.sales; }, 0);
  var totalNet = list.reduce(function(s, a) { return s + a.net_sales; }, 0);
  var totalAd = list.reduce(function(s, a) { return s + a.ad_total; }, 0);
  var totalRefund = list.reduce(function(s, a) { return s + a.refund_amount; }, 0);
  var dateRange = '--';
  var allDates = [];
  var dateSeen = {};
  for (var di = 0; di < appData.datasets.length; di++) {
    var dRecs = appData.datasets[di].records || [];
    for (var dj = 0; dj < dRecs.length; dj++) {
      var dd = dRecs[dj].start_time ? normDate(dRecs[dj].start_time.substring(0, 10)) : '';
      if (dd && !dateSeen[dd]) { dateSeen[dd] = true; allDates.push(dd); }
    }
  }
  allDates.sort();
  dateRange = allDates.length > 0 ? allDates[0] + ' ~ ' + allDates[allDates.length-1] : '--';
  document.getElementById('summaryCards').innerHTML =
    '<div class="summary-card card-date">' +
      '<div class="card-icon">📅</div>' +
      '<div class="card-label">数据日期</div>' +
      '<div class="card-value" style="font-size:22px;color:var(--cyan)">' + dateRange + '</div>' +
    '</div>' +
    '<div class="summary-card card-sales">' +
      '<div class="card-icon">💰</div>' +
      '<div class="card-label">总成交金额</div>' +
      '<div class="card-value" style="color:var(--brand)">' + fmtMoney(totalSales) + '</div>' +
      '<div class="card-sub">' + list.length + ' 位达人</div>' +
    '</div>' +
    '<div class="summary-card card-net">' +
      '<div class="card-icon">✅</div>' +
      '<div class="card-label">退后总成交额</div>' +
      '<div class="card-value" style="color:var(--green)">' + fmtMoney(totalNet) + '</div>' +
      '<div class="card-sub">退款率 ' + (totalSales>0 ? ((totalRefund/totalSales*100).toFixed(1)) : '0') + '%</div>' +
    '</div>' +
    '<div class="summary-card card-ad">' +
      '<div class="card-icon">📢</div>' +
      '<div class="card-label">总投放消耗</div>' +
      '<div class="card-value" style="color:var(--amber)">' + fmtMoney(totalAd) + '</div>' +
      '<div class="card-sub">综合ROI ' + (totalAd>0 ? (totalNet/totalAd).toFixed(2) : '--') + '</div>' +
    '</div>';
  var tbody = document.getElementById('tableBody');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10"><div class="empty"><div class="empty-icon">🔍</div><p>没有匹配的数据</p></div></td></tr>';
  } else {
    tbody.innerHTML = list.map(function(a, idx) {
      var rank = idx + 1;
      var rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '<span class="rank-num">' + rank + '</span>';
      var fanPct = (a.old_fan_ratio * 100).toFixed(1);
      var roiDisplay = a.roi >= 0 ? a.roi.toFixed(2) : '--';
      return '<tr>' +
        '<td class="rank">' + rankIcon + '</td>' +
        '<td><div class="anchor-cell">' + (a.avatar ? '<img class="avatar" src="' + a.avatar + '" loading="lazy" onerror="this.style.display=\'none\'">' : '') + '<span class="name">' + a.name + '</span></div></td>' +
        '<td class="num">' + fmtDuration(a.duration_total) + '</td>' +
        '<td class="num money money-sales">' + fmtMoney(a.sales) + '</td>' +
        '<td class="num money money-refund">' + fmtMoney(a.refund_amount) + '</td>' +
        '<td class="num money money-net">' + fmtMoney(a.net_sales) + '</td>' +
        '<td class="num">' + fmtNum(a.viewers) + '</td>' +
        '<td><div class="fan-bar-wrap"><div class="fan-bar"><div class="fan-bar-fill" style="width:' + fanPct + '%"></div></div><span class="fan-pct">' + fanPct + '%</span></div></td>' +
        '<td class="num">' + fmtMoney(a.ad_total) + '</td>' +
        '<td><span class="roi-badge ' + getROIClass(a.roi) + '">' + roiDisplay + '</span></td>' +
      '</tr>';
    }).join('');
  }
  document.getElementById('recordCount').textContent = '共 ' + list.length + ' 位达人';
  updateDateFilter(records);
}

function updateDateFilter(records) {
  var sel = document.getElementById('dateFilter');
  var current = sel.value;
  var dates = [];
  var seen = {};
  for (var i = 0; i < records.length; i++) {
    var d = records[i].start_time ? normDate(records[i].start_time.substring(0, 10)) : '';
    if (d && !seen[d]) { seen[d] = true; dates.push(d); }
  }
  dates.sort();
  sel.innerHTML = '<option value="all">全部日期</option>' + dates.map(function(d) {
    return '<option value="' + d + '"' + (d===current ? ' selected' : '') + '>' + d + '</option>';
  }).join('');
}

function addDataset(label, dateRange, records) {
  var id = 'ds_' + Date.now();
  appData.datasets.push({ id: id, label: label, dateRange: dateRange, records: records, importedAt: new Date().toISOString() });
  appData.activeIdx = appData.datasets.length - 1;
  saveAll(appData);
}

function triggerJSONImport() {

  inp.onchange = function(ev) {
    handleJSONImport(ev);
    closeImportModal();
  };
  inp.click();
}

function closeImportModal() {
  var m = document.getElementById('importModal');
  if (m) m.remove();
}

function parseExcelRecords(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      if (typeof XLSX === 'undefined') { showToast('Excel解析库加载中，请稍后再试', 'error'); return; }
      var wb = XLSX.read(e.target.result, { type: 'array' });
      var ws = wb.Sheets[wb.SheetNames[0]];
      var raw = XLSX.utils.sheet_to_json(ws, { header: 1 });
      if (raw.length < 2) { showToast('Excel数据为空', 'error'); return; }
      var headers = raw[0];
      var rows = [];
      for (var i = 1; i < raw.length; i++) {
        var row = raw[i];
        if (!row || row.length === 0) continue;
        var r = {};
        for (var j = 0; j < headers.length; j++) r[headers[j]] = row[j] != null ? row[j] : '';
        rows.push({
          avatar: String(r['主播头像'] || r['avatar'] || ''),
          name: String(r['主播昵称'] || r['name'] || ''),
          douyin_id: String(r['主播抖音号'] || r['douyin_id'] || ''),
          start_time: String(r['直播开始时间'] || r['start_time'] || ''),
          end_time: String(r['直播结束时间'] || r['end_time'] || ''),
          duration_min: parseFloat(r['直播时长(分钟)'] || r['duration_min']) || 0,
          viewers: parseInt(r['直播间观看人数'] || r['viewers']) || 0,
          old_fan_ratio: parseFloat(r['观看老粉占比'] || r['old_fan_ratio']) || 0,
          sales: parseFloat(r['直播间成交金额'] || r['sales']) || 0,
          refund_amount: parseFloat(r['直播间退款金额'] || r['refund_amount']) || 0,
          orders: parseInt(r['直播间成交订单数'] || r['orders']) || 0,
          refund_orders: parseInt(r['直播间退款订单数'] || r['refund_orders']) || 0,
          ad_cost_bind: parseFloat(r['投放消耗(店铺绑定)'] || r['ad_cost_bind']) || 0,
          ad_cost_bid: parseFloat(r['投放消耗(店铺被投)'] || r['ad_cost_bid']) || 0,
          net_sales: parseFloat(r['净成交金额'] || r['net_sales']) || 0,
          net_orders: parseInt(r['净成交订单数'] || r['net_orders']) || 0,
          commision: parseFloat(r['预估佣金支出'] || r['commision']) || 0
        });
      }
      callback(rows);
    } catch(err) { showToast('Excel解析失败：' + err.message, 'error'); }
  };
  reader.readAsArrayBuffer(file);
}

function handleExcelImport(event) {
  var file = event.target.files[0];
  if (!file) return;
  parseExcelRecords(file, function(rows) {
    if (rows.length === 0) { showToast('未能解析到有效数据', 'error'); return; }
    finishImport(file.name.replace(/\.\w+$/, ''), rows);
  });
  event.target.value = '';
}

function handleJSONImport(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var raw = JSON.parse(e.target.result);
      var rows = Array.isArray(raw) ? raw : (raw.records || []);
      if (rows.length === 0 || !rows[0].name) { showToast('数据格式不正确', 'error'); return; }
      finishImport(file.name.replace(/\.\w+$/, ''), rows);
    } catch(err) { showToast('JSON解析失败：' + err.message, 'error'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function finishImport(labelPrefix, rows) {
  var dates = [];
  var seen = {};
  for (var i = 0; i < rows.length; i++) {
    var d = rows[i].start_time ? normDate(rows[i].start_time.substring(0, 10)) : '';
    if (d && !seen[d]) { seen[d] = true; dates.push(d); }
  }
  dates.sort();
  var dateRange = dates.length > 0 ? dates[0] + '~' + dates[dates.length-1] : '未知日期';
  var label = labelPrefix + ' (' + dateRange + ')';
  addDataset(label, dateRange, rows);
  if (currentTab === 'dashboard') { sortKey = 'sales'; sortAsc = false; renderDashboard(); }
  if (currentTab === 'monthly') renderMonthly();
  if (currentTab === 'daily') { dailySortKey = 'sales'; dailySortAsc = false; renderDailyDashboard(); }
  if (currentTab === 'roster') renderRoster();
  showToast('成功导入 ' + rows.length + ' 条记录！', 'success');
  // 自动触发 JSON 导出（用于每日自动截图）
  setTimeout(function() { exportJSON(); }, 500);
}

var _monthlyDataCache = null;
var _currentMonthAnchors = null;
var _currentMonthKey = null;

function sortMonthDetail(key) {
  if (monthDetailSortKey === key) { monthDetailSortAsc = !monthDetailSortAsc; }
  else { monthDetailSortKey = key; monthDetailSortAsc = false; }
  var ths = document.querySelectorAll('#monthlyDetail thead th');
  for (var i = 0; i < ths.length; i++) { ths[i].classList.remove('sorted', 'asc'); }
  for (var j = 0; j < ths.length; j++) {
    if (ths[j].getAttribute('onclick') && ths[j].getAttribute('onclick').indexOf("'" + key + "'") > -1) {
      ths[j].classList.add('sorted');
      if (monthDetailSortAsc) ths[j].classList.add('asc');
      break;
    }
  }
  renderMonthDetail(_currentMonthAnchors);
}

function renderMonthDetail(anchors) {
  var sorted = anchors.slice().sort(function(a, b) {
    var va = a[monthDetailSortKey] != null ? a[monthDetailSortKey] : 0;
    var vb = b[monthDetailSortKey] != null ? b[monthDetailSortKey] : 0;
    if (typeof va === 'string') return monthDetailSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return monthDetailSortAsc ? va - vb : vb - va;
  });
  document.getElementById('monthlyDetailTitle').textContent = _currentMonthKey + ' 达人明细';
  document.getElementById('monthlyDetailBody').innerHTML = sorted.map(function(a, idx) {
    var rank = idx + 1;
    var rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '<span class="rank-num">' + rank + '</span>';
    var roiDisp = a.roi >= 0 ? a.roi.toFixed(2) : '--';
    return '<tr>' +
      '<td class="rank">' + rankIcon + '</td>' +
      '<td><div class="anchor-cell">' + (a.avatar ? '<img class="avatar" src="' + a.avatar + '" loading="lazy" onerror="this.style.display=\'none\'">' : '') + '<span class="name">' + a.name + '</span></div></td>' +
      '<td class="num money money-sales">' + fmtMoney(a.sales) + '</td>' +
      '<td class="num money money-refund">' + fmtMoney(a.refund_amount) + '</td>' +
      '<td class="num money money-net">' + fmtMoney(a.net_sales) + '</td>' +
      '<td class="num">' + fmtMoney(a.ad_total) + '</td>' +
      '<td><span class="roi-badge ' + getROIClass(a.roi) + '">' + roiDisp + '</span></td>' +
      '<td class="num">' + fmtNum(a.viewers) + '</td>' +
      '<td class="num">' + (a.live_count || 0) + ' 场</td>' +
      '</tr>';
  }).join('');
}

function selectMonth(monthKey) {
  selectedMonth = monthKey;
  _currentMonthKey = monthKey;
  var allCards = document.querySelectorAll('.monthly-card');
  for (var i = 0; i < allCards.length; i++) allCards[i].classList.remove('active');
  var idx = -1;
  for (var j = 0; j < _monthlyDataCache.length; j++) {
    if (_monthlyDataCache[j].month === monthKey) { idx = j; break; }
  }
  var card = document.getElementById('monthCard_' + idx);
  if (card) card.classList.add('active');
  var ms = _monthlyDataCache[idx];
  if (!ms) return;
  _currentMonthAnchors = ms.anchors;
  monthDetailSortKey = 'sales';
  monthDetailSortAsc = false;
  var detail = document.getElementById('monthlyDetail');
  detail.style.display = 'block';
  renderMonthDetail(ms.anchors);
  detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeMonthDetail() {
  selectedMonth = null;
  document.getElementById('monthlyDetail').style.display = 'none';
  var allCards = document.querySelectorAll('.monthly-card');
  for (var i = 0; i < allCards.length; i++) allCards[i].classList.remove('active');
}

function renderMonthly() {
  var records = activeRecords();
  if (records.length === 0) {
    document.getElementById('monthlyCards').innerHTML = '<div class="empty"><div class="empty-icon">📅</div><p>暂无数据</p></div>';
    return;
  }
  var monthMap = new Map();
  for (var i = 0; i < records.length; i++) {
    var r = records[i];
    if (!r.start_time) continue;
    var monthKey = normDate(r.start_time.substring(0, 7));
    if (!monthMap.has(monthKey)) monthMap.set(monthKey, new Map());
    var anchorMap = monthMap.get(monthKey);
    var k = r.name || '未知';
    if (!anchorMap.has(k)) {
      anchorMap.set(k, { name: k, avatar: r.avatar || '', viewers: 0, sales: 0, refund_amount: 0, net_sales: 0, ad_cost_bind: 0, ad_cost_bid: 0, live_count: 0 });
    }
    var a = anchorMap.get(k);
    a.viewers += r.viewers || 0;
    a.sales += r.sales || 0;
    a.refund_amount += r.refund_amount || 0;
    a.net_sales += r.net_sales || 0;
    a.ad_cost_bind += r.ad_cost_bind || 0;
    a.ad_cost_bid += r.ad_cost_bid || 0;
    a.live_count += 1;
  }
  var monthKeys = [];
  monthMap.forEach(function(_, k) { monthKeys.push(k); });
  monthKeys.sort();
  var monthStats = monthKeys.map(function(m) {
    var anchorMap = monthMap.get(m);
    var anchors = [];
    anchorMap.forEach(function(a) {
      anchors.push({
        name: a.name, avatar: a.avatar, viewers: a.viewers, sales: a.sales,
        refund_amount: a.refund_amount, net_sales: a.net_sales,
        ad_total: a.ad_cost_bind + a.ad_cost_bid,
        roi: (a.ad_cost_bind + a.ad_cost_bid) > 0 ? a.net_sales / (a.ad_cost_bind + a.ad_cost_bid) : -1,
        live_count: a.live_count
      });
    });
    var totSales = anchors.reduce(function(s,a) { return s + a.sales; }, 0);
    var totNet = anchors.reduce(function(s,a) { return s + a.net_sales; }, 0);
    var totAd = anchors.reduce(function(s,a) { return s + a.ad_total; }, 0);
    var totViewers = anchors.reduce(function(s,a) { return s + a.viewers; }, 0);
    return { month: m, anchors: anchors, totSales: totSales, totNet: totNet, totAd: totAd, totViewers: totViewers, anchorCount: anchors.length };
  });
  _monthlyDataCache = monthStats;
  document.getElementById('monthlyCards').innerHTML = monthStats.map(function(ms, idx) {
    return '<div class="monthly-card" onclick="selectMonth(\'' + ms.month + '\')" id="monthCard_' + idx + '">' +
      '<div class="month-label">📅 ' + ms.month + '</div>' +
      '<div class="stat-row"><span class="stat-key">达人数量</span><span class="stat-val" style="color:var(--brand)">' + ms.anchorCount + ' 位</span></div>' +
      '<div class="stat-row"><span class="stat-key">总观看</span><span class="stat-val">' + fmtNum(ms.totViewers) + '</span></div>' +
      '<div class="stat-row"><span class="stat-key">成交金额</span><span class="stat-val money money-sales">' + fmtMoney(ms.totSales) + '</span></div>' +
      '<div class="stat-row"><span class="stat-key">退后成交额</span><span class="stat-val money money-net">' + fmtMoney(ms.totNet) + '</span></div>' +
      '<div class="stat-row"><span class="stat-key">投放消耗</span><span class="stat-val" style="color:var(--amber)">' + fmtMoney(ms.totAd) + '</span></div>' +
      '<div class="stat-row"><span class="stat-key">综合ROI</span><span class="stat-val" style="font-weight:700;">' + (ms.totAd>0 ? (ms.totNet/ms.totAd).toFixed(2) : '--') + '</span></div>' +
    '</div>';
  }).join('');
}

function normDate(d) { return d.replace(/\//g, '-'); }

function getYesterday() {
  var d = new Date();
  d.setDate(d.getDate() - 1);
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var dt = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dt;
}

function sortDailyBy(key) {
  if (dailySortKey === key) { dailySortAsc = !dailySortAsc; }
  else { dailySortKey = key; dailySortAsc = false; }
  var ths = document.querySelectorAll('#tabDaily thead th');
  for (var i = 0; i < ths.length; i++) ths[i].classList.remove('sorted', 'asc');
  var target = document.querySelector('#tabDaily thead th[data-key="' + key + '"]');
  if (target) { target.classList.add('sorted'); if (dailySortAsc) target.classList.add('asc'); }
  renderDailyDashboard();
}

function updateDailyDateFilter(records) {
  var sel = document.getElementById('dailyDateFilter');
  var current = sel.value;
  var dates = [];
  var seen = {};
  for (var i = 0; i < records.length; i++) {
    var d = records[i].start_time ? normDate(records[i].start_time.substring(0, 10)) : '';
    if (d && !seen[d]) { seen[d] = true; dates.push(d); }
  }
  dates.sort();
  var defaultVal = current || (dates.length > 0 ? dates[dates.length-1] : 'all');
  sel.innerHTML = '<option value="all">全部日期</option>' + dates.map(function(d) {
    return '<option value="' + d + '"' + (d === defaultVal ? ' selected' : '') + '>' + d + '</option>';
  }).join('');
}

function renderDailyDashboard() {
  var records = activeRecords();
  updateDailyDateFilter(records);
  var dateFilter = document.getElementById('dailyDateFilter').value;
  var filtered = dateFilter !== 'all' ? records.filter(function(r) { return r.start_time && normDate(r.start_time).indexOf(dateFilter) === 0; }) : records;
  if (filtered.length === 0) {
    document.getElementById('dailyTableBody').innerHTML = '<tr><td colspan="10"><div class="empty"><div class="empty-icon">📦</div><p>暂无数据</p></div></td></tr>';
    document.getElementById('dailySummaryCards').innerHTML = '';
    document.getElementById('dailyRecordCount').textContent = '';
    return;
  }
  var search = document.getElementById('dailySearchInput').value.toLowerCase();
  if (search) filtered = filtered.filter(function(r) { return (r.name||'').toLowerCase().indexOf(search) > -1; });
  var list = aggregateByName(filtered);
  var hideZero = document.getElementById('dailyHideZeroSales').checked;
  if (hideZero) list = list.filter(function(a) { return a.sales > 0; });
  list.sort(function(a, b) {
    var va = a[dailySortKey] != null ? a[dailySortKey] : 0;
    var vb = b[dailySortKey] != null ? b[dailySortKey] : 0;
    if (typeof va === 'string') return dailySortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return dailySortAsc ? va - vb : vb - va;
  });
  var totalSales = list.reduce(function(s, a) { return s + a.sales; }, 0);
  var totalNet = list.reduce(function(s, a) { return s + a.net_sales; }, 0);
  var totalAd = list.reduce(function(s, a) { return s + a.ad_total; }, 0);
  var totalRefund = totalSales - totalNet;
  var dates = [];
  var seen = {};
  for (var i = 0; i < records.length; i++) {
    var d = records[i].start_time ? normDate(records[i].start_time.substring(0, 10)) : '';
    if (d && !seen[d]) { seen[d] = true; dates.push(d); }
  }
  dates.sort();
  var displayDate = dateFilter !== 'all' ? dateFilter : (dates.length > 0 ? dates[dates.length-1] : '--');
  document.getElementById('dailySummaryCards').innerHTML =
    '<div class="summary-card card-date">' +
      '<div class="card-icon">📆</div>' +
      '<div class="card-label">数据日期</div>' +
      '<div class="card-value" style="font-size:22px;color:var(--cyan)">' + displayDate + '</div>' +
    '</div>' +
    '<div class="summary-card card-sales">' +
      '<div class="card-icon">💰</div>' +
      '<div class="card-label">总成交金额</div>' +
      '<div class="card-value" style="color:var(--brand)">' + fmtMoney(totalSales) + '</div>' +
      '<div class="card-sub">' + list.length + ' 位达人</div>' +
    '</div>' +
    '<div class="summary-card card-net">' +
      '<div class="card-icon">✅</div>' +
      '<div class="card-label">退后总成交额</div>' +
      '<div class="card-value" style="color:var(--green)">' + fmtMoney(totalNet) + '</div>' +
      '<div class="card-sub">退款率 ' + (totalSales>0 ? ((totalRefund/totalSales*100).toFixed(1)) : '0') + '%</div>' +
    '</div>' +
    '<div class="summary-card card-ad">' +
      '<div class="card-icon">📢</div>' +
      '<div class="card-label">总投放消耗</div>' +
      '<div class="card-value" style="color:var(--amber)">' + fmtMoney(totalAd) + '</div>' +
      '<div class="card-sub">综合ROI ' + (totalAd>0 ? (totalNet/totalAd).toFixed(2) : '--') + '</div>' +
    '</div>';
  var tbody = document.getElementById('dailyTableBody');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10"><div class="empty"><div class="empty-icon">🔍</div><p>没有匹配的数据</p></div></td></tr>';
  } else {
    tbody.innerHTML = list.map(function(a, idx) {
      var rank = idx + 1;
      var rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '<span class="rank-num">' + rank + '</span>';
      var fanPct = (a.old_fan_ratio * 100).toFixed(1);
      var roiDisplay = a.roi >= 0 ? a.roi.toFixed(2) : '--';
      return '<tr>' +
        '<td class="rank">' + rankIcon + '</td>' +
        '<td><div class="anchor-cell">' + (a.avatar ? '<img class="avatar" src="' + a.avatar + '" loading="lazy" onerror="this.style.display=\'none\'">' : '') + '<span class="name">' + a.name + '</span></div></td>' +
        '<td class="num">' + fmtDuration(a.duration_total) + '</td>' +
        '<td class="num money money-sales">' + fmtMoney(a.sales) + '</td>' +
        '<td class="num money money-refund">' + fmtMoney(a.refund_amount) + '</td>' +
        '<td class="num money money-net">' + fmtMoney(a.net_sales) + '</td>' +
        '<td class="num">' + fmtNum(a.viewers) + '</td>' +
        '<td><div class="fan-bar-wrap"><div class="fan-bar"><div class="fan-bar-fill" style="width:' + fanPct + '%"></div></div><span class="fan-pct">' + fanPct + '%</span></div></td>' +
        '<td class="num">' + fmtMoney(a.ad_total) + '</td>' +
        '<td><span class="roi-badge ' + getROIClass(a.roi) + '">' + roiDisplay + '</span></td>' +
      '</tr>';
    }).join('');
  }
  document.getElementById('dailyRecordCount').textContent = '共 ' + list.length + ' 位达人';
}

var _rosterList = [];

function sortRoster(key) {
  if (rosterSortKey === key) { rosterSortAsc = !rosterSortAsc; }
  else { rosterSortKey = key; rosterSortAsc = false; }
  var ths = document.querySelectorAll('#tabRoster thead th');
  for (var i = 0; i < ths.length; i++) { ths[i].classList.remove('sorted', 'asc'); }
  for (var j = 0; j < ths.length; j++) {
    if (ths[j].getAttribute('onclick') && ths[j].getAttribute('onclick').indexOf("'" + key + "'") > -1) {
      ths[j].classList.add('sorted');
      if (rosterSortAsc) ths[j].classList.add('asc');
      break;
    }
  }
  renderRosterTable(_rosterList);
}

function renderRosterTable(list) {
  if (list.length === 0) {
    document.getElementById('rosterBody').innerHTML = '<tr><td colspan="8"><div class="empty"><div class="empty-icon">📋</div><p>没有匹配的数据</p></div></td></tr>';
    document.getElementById('rosterCount').textContent = '';
    return;
  }
  var sorted = list.slice().sort(function(a, b) {
    var va = a[rosterSortKey] != null ? a[rosterSortKey] : 0;
    var vb = b[rosterSortKey] != null ? b[rosterSortKey] : 0;
    if (rosterSortKey === 'roi') {
      var adA = a.ad_cost_bind + a.ad_cost_bid, adB = b.ad_cost_bind + b.ad_cost_bid;
      va = adA > 0 ? a.net_sales / adA : -1;
      vb = adB > 0 ? b.net_sales / adB : -1;
    }
    if (rosterSortKey === 'ad_total') {
      va = a.ad_cost_bind + a.ad_cost_bid;
      vb = b.ad_cost_bind + b.ad_cost_bid;
    }
    if (typeof va === 'string') return rosterSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return rosterSortAsc ? va - vb : vb - va;
  });
  var totSales = sorted.reduce(function(s,a) { return s + a.sales; }, 0);
  var totNet = sorted.reduce(function(s,a) { return s + a.net_sales; }, 0);
  var totAd = sorted.reduce(function(s,a) { return s + a.ad_cost_bind + a.ad_cost_bid; }, 0);
  document.getElementById('rosterCount').textContent = '共 ' + sorted.length + ' 位达人  |  总成交 ' + fmtMoney(totSales) + '  |  ROI ' + (totAd>0 ? (totNet/totAd).toFixed(2) : '--');
  document.getElementById('rosterBody').innerHTML = sorted.map(function(a, idx) {
    var rank = idx + 1;
    var rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '<span class="rank-num">' + rank + '</span>';
    var adTotal = a.ad_cost_bind + a.ad_cost_bid;
    var roi = adTotal > 0 ? a.net_sales / adTotal : -1;
    var roiDisp = roi >= 0 ? roi.toFixed(2) : '--';
    return '<tr>' +
      '<td class="rank">' + rankIcon + '</td>' +
      '<td><div class="anchor-cell">' + (a.avatar ? '<img class="avatar" src="' + a.avatar + '" loading="lazy" onerror="this.style.display=\'none\'">' : '') + '<span class="name">' + a.name + '</span></div></td>' +
      '<td style="font-family:monospace;font-size:12px;color:var(--text2);">' + (a.douyin_id || '--') + '</td>' +
      '<td class="num">' + a.live_count + ' 场</td>' +
      '<td class="num money money-sales">' + fmtMoney(a.sales) + '</td>' +
      '<td class="num money money-net">' + fmtMoney(a.net_sales) + '</td>' +
      '<td class="num">' + fmtMoney(adTotal) + '</td>' +
      '<td><span class="roi-badge ' + getROIClass(roi) + '">' + roiDisp + '</span></td>' +
      '</tr>';
  }).join('');
}

function renderRoster() {
  var records = activeRecords();
  if (records.length === 0) {
    document.getElementById('rosterBody').innerHTML = '<tr><td colspan="8"><div class="empty"><div class="empty-icon">📋</div><p>暂无数据</p></div></td></tr>';
    document.getElementById('rosterCount').textContent = '';
    _rosterList = [];
    return;
  }
  var rosterMap = new Map();
  for (var i = 0; i < records.length; i++) {
    var r = records[i];
    var key = (r.name || '未知') + '|||' + (r.douyin_id || '');
    if (!rosterMap.has(key)) {
      rosterMap.set(key, { name: r.name || '未知', avatar: r.avatar || '', douyin_id: r.douyin_id || '', live_count: 0, viewers: 0, sales: 0, net_sales: 0, ad_cost_bind: 0, ad_cost_bid: 0 });
    }
    var a = rosterMap.get(key);
    a.live_count += 1;
    a.viewers += r.viewers || 0;
    a.sales += r.sales || 0;
    a.net_sales += r.net_sales || 0;
    a.ad_cost_bind += r.ad_cost_bind || 0;
    a.ad_cost_bid += r.ad_cost_bid || 0;
  }
  var list = [];
  rosterMap.forEach(function(a) { list.push(a); });
  var search = document.getElementById('rosterSearchInput').value.toLowerCase();
  if (search) list = list.filter(function(a) {
    return (a.name||'').toLowerCase().indexOf(search) > -1 || (a.douyin_id||'').toLowerCase().indexOf(search) > -1;
  });
  _rosterList = list;
  rosterSortKey = 'sales';
  rosterSortAsc = false;
  renderRosterTable(list);
}

function exportRosterCSV() {
  var records = activeRecords();
  if (records.length === 0) { showToast('没有数据可导出', 'error'); return; }
  var rosterMap = new Map();
  for (var i = 0; i < records.length; i++) {
    var r = records[i];
    var key = (r.name || '未知') + '|||' + (r.douyin_id || '');
    if (!rosterMap.has(key)) {
      rosterMap.set(key, { name: r.name || '未知', douyin_id: r.douyin_id || '', live_count: 0, sales: 0, net_sales: 0, ad_cost_bind: 0, ad_cost_bid: 0 });
    }
    var a = rosterMap.get(key);
    a.live_count += 1;
    a.sales += r.sales || 0;
    a.net_sales += r.net_sales || 0;
    a.ad_cost_bind += r.ad_cost_bind || 0;
    a.ad_cost_bid += r.ad_cost_bid || 0;
  }
  var list = [];
  rosterMap.forEach(function(a) { list.push(a); });
  list.sort(function(a, b) { return b.sales - a.sales; });
  var headers = ['排名','达人名称','抖音号','直播场次','成交金额','退后成交额','投放消耗','ROI'];
  var csv = ['\uFEFF' + headers.join(',')];
  for (var i = 0; i < list.length; i++) {
    var a = list[i];
    var adTotal = a.ad_cost_bind + a.ad_cost_bid;
    var roi = adTotal > 0 ? (a.net_sales / adTotal).toFixed(2) : 'N/A';
    csv.push([i+1, a.name, a.douyin_id||'', a.live_count, a.sales, a.net_sales, adTotal, roi].join(','));
  }
  var blob = new Blob([csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '达人名单_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('名单导出成功！', 'success');
}

function exportJSON() {
  var jsonStr = JSON.stringify(appData, null, 2);
  // 下载 JSON 文件（浏览器本地）
  var blob = new Blob([jsonStr], {type: 'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'liquid_dashboard_data.json';
  a.click();
  URL.revokeObjectURL(a.href);
  // 同时发送到本地服务器（自动覆盖项目目录中的 JSON + 生成截图）
  fetch('http://localhost:3456/api/data', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: jsonStr
  }).then(function(r) { return r.json(); })
    .then(function(rsp) { showToast(rsp.ok ? '✅ 数据已同步 + 截图已生成' : '⚠️ ' + rsp.message, rsp.ok ? 'success' : 'error'); })
    .catch(function() { showToast('JSON 已导出！', 'success'); });
}

function exportCSV() {
  var records = activeRecords();
  if (records.length === 0) { showToast('没有数据可导出', 'error'); return; }
  var list = aggregateByName(records);
  var headers = ['排名','达人','直播时长','成交金额','退款金额','退后成交额','观看人数','老粉占比','投放总消耗','ROI'];
  var csv = ['\uFEFF' + headers.join(',')];
  for (var i = 0; i < list.length; i++) {
    var a = list[i];
    csv.push([
      i+1, a.name, a.duration_total+'min', a.sales, a.refund_amount, a.net_sales, a.viewers,
      (a.old_fan_ratio*100).toFixed(1)+'%', a.ad_total,
      a.roi >= 0 ? a.roi.toFixed(2) : 'N/A'
    ].join(','));
  }
  var blob = new Blob([csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '达人直播数据_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV 导出成功！', 'success');
}

function showClearModal() {
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'clearModal';
  overlay.innerHTML =
    '<div class="modal" onclick="event.stopPropagation()">' +
      '<h3>\u26A0\uFE0F \u6E05\u7A7A\u5168\u90E8\u6570\u636E</h3>' +
      '<p>\u8FD9\u5C06\u5220\u9664\u6240\u6709\u5DF2\u5BFC\u5165\u7684\u6570\u636E\u7248\u672C\uFF0C\u6062\u590D\u5230\u521D\u59CB\u72B6\u6001\u3002\u6B64\u64CD\u4F5C\u4E0D\u53EF\u64A4\u9500\u3002</p>' +
      '<div class="modal-actions">' +
        '<button class="btn btn-outline" onclick="closeClearModal()">\u53D6\u6D88</button>' +
        '<button class="btn btn-danger" onclick="clearAllData()">\u786E\u8BA4\u6E05\u7A7A</button>' +
      '</div>' +
    '</div>';
  overlay.addEventListener('click', closeClearModal);
  document.body.appendChild(overlay);
}

function closeClearModal() {
  var m = document.getElementById('clearModal');
  if (m) m.remove();
}

function clearAllData() {
  localStorage.removeItem(STORAGE_KEY);
  appData = getDefaultDatasets();
  currentTab = 'daily';
  selectedMonth = null;
  sortKey = 'sales';
  sortAsc = false;
  dailySortKey = 'sales';
  dailySortAsc = false;
  _monthlyDataCache = null;
  renderDailyDashboard();
  closeClearModal();
  showToast('\u6570\u636E\u5DF2\u5168\u90E8\u6E05\u7A7A\uFF0C\u53EF\u91CD\u65B0\u4E0A\u4F20', 'success');
}

function switchTab(tab) {
  currentTab = tab;
  var tabs = document.querySelectorAll('.nav-tab');
  for (var i = 0; i < tabs.length; i++) {
    if (tabs[i].dataset.tab === tab) tabs[i].classList.add('active');
    else tabs[i].classList.remove('active');
  }
  document.getElementById('tabDashboard').style.display = tab === 'dashboard' ? '' : 'none';
  document.getElementById('tabMonthly').style.display = tab === 'monthly' ? '' : 'none';
  document.getElementById('tabDaily').style.display = tab === 'daily' ? '' : 'none';
  document.getElementById('tabRoster').style.display = tab === 'roster' ? '' : 'none';
  if (tab === 'dashboard') renderDashboard();
  if (tab === 'monthly') renderMonthly();
  if (tab === 'daily') renderDailyDashboard();
  if (tab === 'roster') renderRoster();
}

function init() {
  switchTab('daily');
}
init();
</script>
